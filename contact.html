<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- CSS LINK (CRITICAL) -->

</head>

<body>

  <!-- NAVBAR -->
  <nav>
    <h2>AI Web Studio</h2>
    <div>
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="services.html">Services</a>
      <a href="contact.html">Contact</a>
    </div>
  </nav>

  <!-- CONTACT SECTION -->
  <section class="contact-section">

    <div class="contact-container">

      <!-- LEFT -->
      <div class="contact-info">
        <h1>Let’s Talk</h1>
        <p>Have a project in mind? Let’s build something powerful together.</p>

        <div class="info-box">
          <p><strong>Email:</strong> contact@aiwebstudio.com</p>
          <p><strong>Phone:</strong> +91 98100 98100</p>
          <p><strong>Location:</strong> India</p>
        </div>
      </div>

      <!-- RIGHT -->
      <div class="contact-form">
        <form id="contactForm" class="form-stack">

          <input type="text" placeholder="Your Name" required>
          <input type="email" placeholder="Your Email" required>
          <textarea placeholder="Your Message" required></textarea>

          <button type="submit">Send Message</button>

        </form>
      </div>

    </div>

  </section>

  <!-- FOOTER -->
  <footer>
    <p>© 2026 AI Web Studio. All rights reserved.</p>
  </footer>

</body>
